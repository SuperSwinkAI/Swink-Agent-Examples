name: Bug Report
description: An example doesn't compile or behave as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below so we can reproduce and fix it quickly.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Which example, what command, what output.
      render: shell
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Run `rustc --version` and `cargo --version` and paste the output here.
      placeholder: |
        rustc 1.88.0 (...)
        cargo 1.88.0 (...)
        OS: macOS 15 / Ubuntu 24.04 / ...
    validations:
      required: true

  - type: dropdown
    id: example
    attributes:
      label: Affected example
      multiple: true
      options:
        - by_model/anthropic
        - by_model/openai
        - by_model/ollama
        - by_model/mistral
        - by_pattern/tool_use
        - by_pattern/tui
        - by_pattern/swarm
        - by_pattern/mock_provider
        - by_pattern/custom_adapter
        - usecases/summarization
        - usecases/research
        - unsure / multiple

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Logs, stack traces, or anything else that might help.
