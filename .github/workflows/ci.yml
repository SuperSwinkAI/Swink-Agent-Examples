name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Swink-Agent-Examples
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: Swink-Agent-Examples

      # The workspace Cargo.toml patches swink-agent crates to the local sibling
      # directory until 0.7.x is published to crates.io.
      - name: Checkout Swink-Agent
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: SuperSwinkAI/Swink-Agent
          path: Swink-Agent

      - name: Install Rust 1.88
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.88"
          components: clippy, rustfmt

      - name: Cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: Swink-Agent-Examples

      - name: cargo fmt --check
        working-directory: Swink-Agent-Examples
        run: cargo fmt --check

      - name: Spell check
        uses: crate-ci/typos@cf5f1c29a8ac336af8568821ec41919923b05a83 # v1
        with:
          files: ./Swink-Agent-Examples

      - name: cargo check --workspace
        working-directory: Swink-Agent-Examples
        run: cargo check --workspace

      - name: cargo clippy --workspace
        working-directory: Swink-Agent-Examples
        run: cargo clippy --workspace -- -D warnings
